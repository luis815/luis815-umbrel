version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: luis815-umbrel-dev-env_server_1
      APP_PORT: 4096

  server:
    image: ghcr.io/luis815/coder-env:v0.0.4
    user: "1000:1000"
    environment:
      OPENCODE_PORT: 4096
      OPENCODE_HOSTNAME: 0.0.0.0
    volumes:
      - ${APP_DATA_DIR}/data/projects:/home/umbrel/projects
    restart: on-failure
