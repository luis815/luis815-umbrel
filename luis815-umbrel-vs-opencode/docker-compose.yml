version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: luis815-umbrel-vs-opencode_server_1
      APP_PORT: 4096

  server:
    image: ghcr.io/luis815/vs-opencode:v0.0.8
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data:/home/vsopencode
    restart: on-failure
